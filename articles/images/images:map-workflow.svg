<svg width="600" height="450" xmlns="http://www.w3.org/2000/svg">
<style>
.box{fill:white;stroke:black;stroke-width:2}
.text{font-family:Arial;font-size:16;text-anchor:middle}
.arrow{stroke:black;stroke-width:2;marker-end:url(#arrow)}
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
<path d="M0,0 L10,3 L0,6 Z" fill="black"/>
</marker>
</defs>

<rect class="box" x="150" y="40" width="300" height="70"/>
<text class="text" x="300" y="80">结构背景</text>

<line class="arrow" x1="300" y1="110" x2="300" y2="170"/>

<rect class="box" x="150" y="170" width="300" height="70"/>
<text class="text" x="300" y="210">行为模式</text>

<line class="arrow" x1="300" y1="240" x2="300" y2="300"/>

<rect class="box" x="150" y="300" width="300" height="70"/>
<text class="text" x="300" y="340">当下状态</text>

</svg>