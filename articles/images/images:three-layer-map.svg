<svg width="600" height="500" xmlns="http://www.w3.org/2000/svg">
<style>
.box{fill:white;stroke:black;stroke-width:2}
.text{font-family:Arial;font-size:16;text-anchor:middle}
.arrow{stroke:black;stroke-width:2;marker-end:url(#arrow)}
</style>

<defs>
<marker id="arrow" markerWidth="10" markerHeight="10" refX="10" refY="3" orient="auto">
<path d="M0,0 L10,3 L0,6 Z" fill="black"/>
</marker>
</defs>

<rect class="box" x="150" y="50" width="300" height="80"/>
<text class="text" x="300" y="85">宏观地图</text>
<text class="text" x="300" y="105">(结构背景)</text>

<line class="arrow" x1="300" y1="130" x2="300" y2="190"/>

<rect class="box" x="150" y="190" width="300" height="80"/>
<text class="text" x="300" y="225">局部地图</text>
<text class="text" x="300" y="245">(行为模式 / MBTI)</text>

<line class="arrow" x1="300" y1="270" x2="300" y2="330"/>

<rect class="box" x="150" y="330" width="300" height="80"/>
<text class="text" x="300" y="365">当前位置</text>
<text class="text" x="300" y="385">(五维盒子)</text>

</svg>