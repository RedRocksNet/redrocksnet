<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="RedRocks 展示摄影、随笔、佛经手书与 TAP 思考的个人创作网站。" />
  <link rel="canonical" href="https://www.redrocks.net/" />
  <meta property="og:site_name" content="RedRocks" />
  <meta property="og:title" content="RedRocks" />
  <meta property="og:description" content="RedRocks 展示摄影、随笔、佛经手书与 TAP 思考的个人创作网站。" />
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://www.redrocks.net/" />
  <meta name="twitter:card" content="summary" />
  <meta name="twitter:title" content="RedRocks" />
  <meta name="twitter:description" content="RedRocks 展示摄影、随笔、佛经手书与 TAP 思考的个人创作网站。" />
  <title>RedRocks</title>

  <link rel="stylesheet" href="/nav.css" />

  <style>
    :root {
      --bg: #171a19;
      --bg-soft: #222725;
      --panel: rgba(43, 48, 44, 0.8);
      --panel-strong: rgba(49, 55, 50, 0.9);
      --line: rgba(215, 201, 165, 0.12);
      --line-strong: rgba(215, 201, 165, 0.22);
      --text: #ebe5d8;
      --muted: #b9b1a1;
      --accent: #c7a86b;
      --accent-soft: rgba(199, 168, 107, 0.16);
      --moss: #6f8a72;
      --shadow: 0 24px 70px rgba(0, 0, 0, 0.18);
      --serif: "Iowan Old Style", "Palatino Linotype", "URW Palladio L", "Book Antiqua", "Songti SC", "STSong", serif;
      --sans: "Avenir Next", "Segoe UI", "PingFang SC", "Hiragino Sans GB", "Noto Sans CJK SC", sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      min-height: 100%;
    }

    body {
      color: var(--text);
      font-family: var(--sans);
      background:
        radial-gradient(circle at top, rgba(111, 138, 114, 0.13), transparent 24%),
        radial-gradient(circle at 82% 16%, rgba(199, 168, 107, 0.08), transparent 18%),
        radial-gradient(circle at 12% 84%, rgba(179, 110, 78, 0.08), transparent 20%),
        linear-gradient(180deg, #171a19 0%, #1b201e 28%, #232826 100%);
      letter-spacing: 0.01em;
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255, 255, 255, 0.014) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255, 255, 255, 0.012) 1px, transparent 1px);
      background-size: 100% 34px, 34px 100%;
      mask-image: linear-gradient(180deg, rgba(0, 0, 0, 0.34), transparent 78%);
      opacity: 0.18;
    }

    main {
      width: min(1260px, calc(100% - 36px));
      margin: 0 auto;
      padding: 108px 0 72px;
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    img {
      max-width: 100%;
      display: block;
    }

    .hero {
      position: relative;
      display: grid;
      grid-template-columns: minmax(0, 1.18fr) minmax(340px, 0.82fr);
      gap: 18px;
      padding: 30px;
      border: 1px solid rgba(217, 202, 162, 0.12);
      border-radius: 30px;
      background:
        linear-gradient(135deg, rgba(49, 55, 50, 0.88), rgba(29, 33, 31, 0.9)),
        var(--panel);
      box-shadow: 0 28px 70px rgba(0, 0, 0, 0.24);
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -18% -34% 24%;
      height: 380px;
      background: radial-gradient(circle, rgba(199, 168, 107, 0.13), transparent 68%);
      pointer-events: none;
    }

    .hero-visual {
      position: relative;
      min-height: 720px;
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.08);
      background:
        radial-gradient(circle at top right, rgba(199, 168, 107, 0.12), transparent 30%),
        #1a1d1c;
    }

    .hero-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: saturate(0.88) contrast(1) brightness(0.86);
      transform: scale(1.01);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(180deg, rgba(25, 29, 27, 0.1), rgba(25, 29, 27, 0.34) 44%, rgba(25, 29, 27, 0.72) 100%),
        linear-gradient(90deg, rgba(25, 29, 27, 0.52), transparent 56%);
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 34px 34px 30px;
    }

    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      color: var(--accent);
      font-size: 12px;
      letter-spacing: 0.24em;
      text-transform: uppercase;
    }

    .eyebrow::before {
      content: "";
      width: 30px;
      height: 1px;
      background: rgba(199, 168, 107, 0.5);
    }

    .hero-copy {
      max-width: 620px;
    }

    .hero-title {
      margin: 16px 0 18px;
      font-family: var(--serif);
      font-size: clamp(40px, 6.4vw, 78px);
      line-height: 0.94;
      letter-spacing: -0.03em;
      text-wrap: balance;
    }

    .hero-title span {
      display: block;
      color: rgba(244, 239, 227, 0.9);
      font-size: 0.68em;
      font-weight: 400;
      letter-spacing: 0;
      margin-top: 10px;
    }

    .hero-lead {
      max-width: 38em;
      color: #dad1c0;
      font-size: 17px;
      line-height: 1.88;
      margin: 0 0 22px;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 160px;
      padding: 13px 20px;
      border-radius: 999px;
      border: 1px solid var(--line-strong);
      transition: transform 0.22s ease, border-color 0.22s ease, background 0.22s ease;
      font-size: 14px;
      letter-spacing: 0.08em;
    }

    .button:hover {
      transform: translateY(-2px);
      border-color: rgba(217, 202, 162, 0.52);
    }

    .button-primary {
      background: linear-gradient(135deg, rgba(199, 168, 107, 0.2), rgba(199, 168, 107, 0.08));
      color: #f2e6c6;
    }

    .button-secondary {
      background: rgba(255, 255, 255, 0.035);
      color: var(--text);
    }

    .hero-footnote {
      max-width: 480px;
      color: rgba(185, 177, 161, 0.92);
      font-size: 13px;
      line-height: 1.7;
      padding-top: 22px;
      border-top: 1px solid rgba(255, 255, 255, 0.06);
    }

    .hero-side {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 16px;
      min-height: 720px;
    }

    .panel-card {
      padding: 22px;
      border-radius: 22px;
      border: 1px solid var(--line);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.02), rgba(255, 255, 255, 0)),
        var(--panel-strong);
    }

    .panel-card--author {
      flex: 0 0 auto;
    }

    .signal-panel {
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 0;
      min-height: 0;
    }

    .signal-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 12px;
      flex: 1 1 auto;
      min-height: 0;
    }

    .signal-item {
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      gap: 10px;
      padding: 18px;
      border-radius: 18px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background: rgba(255, 255, 255, 0.03);
      min-height: 0;
    }

    .signal-item strong {
      display: block;
      font-size: 18px;
      font-family: var(--serif);
      font-weight: 400;
      letter-spacing: -0.02em;
      color: #f2ebde;
    }

    .signal-item span {
      color: rgba(209, 201, 186, 0.9);
      font-size: 13px;
      line-height: 1.75;
    }

    .panel-label {
      color: var(--accent);
      font-size: 11px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .panel-copy {
      margin: 0;
      color: #d1c9ba;
      font-size: 14px;
      line-height: 1.8;
    }

    .section {
      margin-top: 30px;
      padding: 30px;
      border-radius: 28px;
      border: 1px solid rgba(255, 255, 255, 0.06);
      background:
        linear-gradient(180deg, rgba(255, 255, 255, 0.03), rgba(255, 255, 255, 0)),
        rgba(40, 45, 42, 0.76);
      box-shadow: var(--shadow);
    }

    .site-footer {
      margin-top: 28px;
      padding: 22px 4px 0;
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      display: flex;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.7;
    }

    .site-footer a {
      color: #e3d7bc;
    }

    @media (max-width: 1080px) {
      .hero,
      .recent-list {
        grid-template-columns: 1fr;
      }

      .hero-visual {
        min-height: 540px;
      }

      .hero-side {
        min-height: auto;
      }

      .signal-grid {
        grid-template-columns: 1fr 1fr;
      }
    }

    @media (max-width: 720px) {
      main {
        width: min(100% - 18px, 1180px);
        padding-top: 82px;
        padding-bottom: 44px;
      }

      .hero,
      .section {
        padding: 18px;
        border-radius: 22px;
      }

      .hero-visual {
        min-height: 440px;
      }

      .hero-overlay {
        padding: 22px 18px 18px;
      }

      .hero-title {
        font-size: clamp(34px, 11vw, 58px);
      }

      .section-head {
        grid-template-columns: 1fr;
      }

      .signal-grid {
        grid-template-columns: 1fr;
      }

      .signal-item {
        min-height: 120px;
      }
    }
  </style>
</head>

<body>
  <div id="rr-nav-mount" data-current="home"></div>

  <main>
    <section class="hero" aria-label="RedRocks homepage">
      <div class="hero-visual">
        <img
          id="rr-hero-img"
          class="hero-img"
          src="/banner/cover.jpg"
          alt="RedRocks banner"
          loading="eager"
        />
        <div class="hero-overlay">
          <div>
            <div class="eyebrow">RedRocks Archive</div>
          </div>

          <div class="hero-copy">
            <h1 class="hero-title">
              我关心的，是人在世界之中
              <span>如何观看、如何感受、如何安顿。</span>
            </h1>
            <p class="hero-lead">
              这不是栏目堆叠，而是同一个问题的不同入口。
            </p>
            <div class="hero-actions">
              <a class="button button-primary" href="/gallery.html">摄影</a>
              <a class="button button-secondary" href="/articles.html">随笔</a>
            </div>
          </div>

          <div class="hero-footnote" id="rr-hero-caption">
            Photographic seeing · writing · scripture copying · structure
          </div>
        </div>
      </div>
    <aside class="hero-side" aria-label="Homepage signals">
        <div class="panel-card signal-panel">
          <div class="signal-grid">
            <a class="signal-item" href="/gallery.html">
              <strong>观看</strong>
              <span>静观、行走、人间、自然、极地与黑白。</span>
            </a>
            <a class="signal-item" href="/articles.html">
              <strong>书写</strong>
              <span>佛法、杂文、摄影心得与旅行旁白。</span>
            </a>
            <a class="signal-item" href="/sutras.html">
              <strong>安顿</strong>
              <span>在手书与重复中，收拢杂念与速度。</span>
            </a>
            <a class="signal-item" href="/articles/tap.html">
              <strong>结构</strong>
              <span>关于时间、投影、维度与世界模型的长期问题。</span>
            </a>
          </div>
        </div>
      </aside>
    </section>

    <div class="site-footer">
      <div>© RedRocks · 摄影 / 随笔 / 佛经手书 / 时间与结构</div>
      <div>
        <a href="/about.html">关于我</a> ·
        <a href="mailto:redrocks@qq.com">redrocks@qq.com</a>
      </div>
    </div>
  </main>

  <script src="/nav.js" defer></script>
  <script src="/banner_list.js"></script>
  <script>
    (function () {
      const list = (window.__RR_BANNERS__ || []).filter(Boolean);
      if (!list.length) return;
      const pick = list[Math.floor(Math.random() * list.length)];
      const img = document.getElementById("rr-hero-img");
      if (img && pick) img.src = pick;
    })();
  </script>
</body>
</html>
